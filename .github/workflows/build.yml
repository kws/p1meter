name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  go-bridge:
    name: Go bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: p1-to-mqtt

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: p1-to-mqtt/go.mod
          cache-dependency-path: p1-to-mqtt/go.sum

      - name: Test
        run: go test ./...

      - name: Build Raspberry Pi binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/dsmr-mqtt-linux-arm64 ./cmd/dsmr-mqtt
          chmod +x dist/dsmr-mqtt-linux-arm64

      - name: Upload Raspberry Pi binary
        uses: actions/upload-artifact@v7
        with:
          name: dsmr-mqtt-linux-arm64
          path: p1-to-mqtt/dist/dsmr-mqtt-linux-arm64
          if-no-files-found: error

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: go-bridge
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download Raspberry Pi binary
        uses: actions/download-artifact@v8
        with:
          name: dsmr-mqtt-linux-arm64
          path: release

      - name: Prepare release assets
        run: |
          chmod +x release/dsmr-mqtt-linux-arm64
          cd release
          sha256sum dsmr-mqtt-linux-arm64 > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/dsmr-mqtt-linux-arm64 \
            release/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --verify-tag \
            --generate-notes

  docker-image:
    name: Docker image
    runs-on: ubuntu-latest
    env:
      CAN_PUSH_DOCKER: ${{ github.event_name != 'pull_request' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: env.CAN_PUSH_DOCKER == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/kws/p1-decoder
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: ./p1-decoder
          file: ./p1-decoder/docker/Dockerfile
          push: ${{ env.CAN_PUSH_DOCKER == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Explain skipped Docker Hub push
        if: github.event_name != 'pull_request' && env.CAN_PUSH_DOCKER != 'true'
        run: |
          echo "Docker image was built but not pushed."
          echo "Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets to enable Docker Hub publishing."
