# dsmr_p1_mapping.yaml
# Maps DSMR/ESMR P1 OBIS codes to:
# - header: CSV/column-safe identifier (snake_case)
# - name: human-friendly label
# - unit: parsed unit when present (informational; you can still parse units from values)
# Notes:
# - Some fields (e.g., 0-0:96.13.0) can be empty depending on meter/config.
# - 1-0:99.97.0 is a structured “power failure event log” blob; header maps the whole payload.

dsmr_p1:

  "1-3:0.2.8":
    header: dsmr_version
    name: DSMR/ESMR version
    unit: null

  "0-0:1.0.0":
    header: telegram_timestamp
    name: Telegram timestamp
    unit: null

  "0-0:96.1.1":
    header: electricity_meter_id
    name: Electricity meter equipment identifier (EAN / serial)
    unit: null

  "1-0:1.8.1":
    header: electricity_import_t1_kwh
    name: Total electricity imported (consumed) - tariff 1
    unit: kWh

  "1-0:1.8.2":
    header: electricity_import_t2_kwh
    name: Total electricity imported (consumed) - tariff 2
    unit: kWh

  "1-0:2.8.1":
    header: electricity_export_t1_kwh
    name: Total electricity exported (delivered) - tariff 1
    unit: kWh

  "1-0:2.8.2":
    header: electricity_export_t2_kwh
    name: Total electricity exported (delivered) - tariff 2
    unit: kWh

  "0-0:96.14.0":
    header: active_tariff
    name: Active tariff indicator
    unit: null

  "1-0:1.7.0":
    header: power_import_kw
    name: Instantaneous active power import (consumption)
    unit: kW

  "1-0:2.7.0":
    header: power_export_kw
    name: Instantaneous active power export (production)
    unit: kW

  "0-0:96.7.21":
    header: power_failures_count
    name: Number of power failures (long)
    unit: null

  "0-0:96.7.9":
    header: power_failures_long_count
    name: Number of long power failures
    unit: null

  "1-0:99.97.0":
    header: power_failure_event_log
    name: Power failure event log (structured list payload)
    unit: null

  "1-0:32.32.0":
    header: voltage_sags_l1_count
    name: Voltage sags (undervoltage events) - phase L1
    unit: null

  "1-0:52.32.0":
    header: voltage_sags_l2_count
    name: Voltage sags (undervoltage events) - phase L2
    unit: null

  "1-0:72.32.0":
    header: voltage_sags_l3_count
    name: Voltage sags (undervoltage events) - phase L3
    unit: null

  "1-0:32.36.0":
    header: voltage_swells_l1_count
    name: Voltage swells (overvoltage events) - phase L1
    unit: null

  "1-0:52.36.0":
    header: voltage_swells_l2_count
    name: Voltage swells (overvoltage events) - phase L2
    unit: null

  "1-0:72.36.0":
    header: voltage_swells_l3_count
    name: Voltage swells (overvoltage events) - phase L3
    unit: null

  "0-0:96.13.0":
    header: text_message
    name: Text message / diagnostic message (may be empty)
    unit: null

  "1-0:32.7.0":
    header: voltage_l1_v
    name: Voltage - phase L1
    unit: V

  "1-0:52.7.0":
    header: voltage_l2_v
    name: Voltage - phase L2
    unit: V

  "1-0:72.7.0":
    header: voltage_l3_v
    name: Voltage - phase L3
    unit: V

  "1-0:31.7.0":
    header: current_l1_a
    name: Current - phase L1
    unit: A

  "1-0:51.7.0":
    header: current_l2_a
    name: Current - phase L2
    unit: A

  "1-0:71.7.0":
    header: current_l3_a
    name: Current - phase L3
    unit: A

  "1-0:21.7.0":
    header: power_import_l1_kw
    name: Instantaneous active power import - phase L1
    unit: kW

  "1-0:41.7.0":
    header: power_import_l2_kw
    name: Instantaneous active power import - phase L2
    unit: kW

  "1-0:61.7.0":
    header: power_import_l3_kw
    name: Instantaneous active power import - phase L3
    unit: kW

  "1-0:22.7.0":
    header: power_export_l1_kw
    name: Instantaneous active power export - phase L1
    unit: kW

  "1-0:42.7.0":
    header: power_export_l2_kw
    name: Instantaneous active power export - phase L2
    unit: kW

  "1-0:62.7.0":
    header: power_export_l3_kw
    name: Instantaneous active power export - phase L3
    unit: kW

  "0-1:24.1.0":
    header: gas_device_type
    name: Gas device type / meter type indicator
    unit: null

  "0-1:96.1.0":
    header: gas_meter_id
    name: Gas meter equipment identifier (EAN / serial)
    unit: null

  "0-1:24.2.1":
    header: gas_reading_m3
    name: Gas reading (with timestamp)
    unit: m3

